<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Snake Game</title>
    <script>
      (function(){var t=localStorage.getItem('snake-game-theme');if(t==='light')document.documentElement.classList.remove('dark');else if(!t&&!window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.remove('dark')})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
